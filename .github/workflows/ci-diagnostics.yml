name: One-shot CI diagnostics

on:
  push:
    branches:
      - master

permissions:
  contents: write

env:
  PYTHONWARNINGS: error
  PIP_DISABLE_PIP_VERSION_CHECK: "1"

jobs:
  diagnose:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Check out master
        uses: actions/checkout@v6
        with:
          ref: master
          show-progress: false

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: pip

      - name: Install development dependencies
        run: python -m pip install --quiet -e '.[dev]'

      - name: Capture all strict gates
        shell: bash
        run: |
          set +e
          overall=0
          {
            echo '=== BLACK ==='
            black --check .
            status=$?
            echo "status=$status"
            if [ "$status" -ne 0 ]; then overall=1; fi

            echo
            echo '=== RUFF ==='
            ruff check . --output-format concise
            status=$?
            echo "status=$status"
            if [ "$status" -ne 0 ]; then overall=1; fi

            echo
            echo '=== MYPY ==='
            mypy src/tui_wifi
            status=$?
            echo "status=$status"
            if [ "$status" -ne 0 ]; then overall=1; fi

            echo
            echo '=== PYTEST ==='
            pytest -m 'not real_network' --tb=short
            status=$?
            echo "status=$status"
            if [ "$status" -ne 0 ]; then overall=1; fi

            echo
            echo '=== CRITICAL COVERAGE ==='
            python scripts/check_critical_coverage.py coverage.json
            status=$?
            echo "status=$status"
            if [ "$status" -ne 0 ]; then overall=1; fi

            echo
            echo '=== BUILD ==='
            rm -rf build dist
            python -m build
            status=$?
            echo "status=$status"
            if [ "$status" -ne 0 ]; then overall=1; fi

            echo
            echo "overall_status=$overall"
          } > CI_DIAGNOSTICS.txt 2>&1
          exit 0

      - name: Commit diagnostics and remove workflow
        shell: bash
        run: |
          rm .github/workflows/ci-diagnostics.yml
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add CI_DIAGNOSTICS.txt .github/workflows/ci-diagnostics.yml
          git commit -m "Record exact CI failure diagnostics"
          git push origin HEAD:master
