name: One-shot remaining CI diagnostics

on:
  push:
    branches:
      - master

permissions:
  contents: write

env:
  PYTHONWARNINGS: error
  PIP_DISABLE_PIP_VERSION_CHECK: "1"

jobs:
  diagnose:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: master
          show-progress: false
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: pip
      - run: python -m pip install --quiet -e '.[dev]'
      - name: Capture remaining failures
        shell: bash
        run: |
          set +e
          {
            echo '=== BLACK ==='
            black --check .
            echo "status=$?"
            echo
            echo '=== RUFF ==='
            ruff check . --output-format concise
            echo "status=$?"
            echo
            echo '=== MYPY ==='
            mypy src/tui_wifi
            echo "status=$?"
            echo
            echo '=== PYTEST ==='
            pytest -m 'not real_network' --tb=short
            echo "status=$?"
            echo
            echo '=== CRITICAL COVERAGE ==='
            python scripts/check_critical_coverage.py coverage.json
            echo "status=$?"
            echo
            echo '=== BUILD ==='
            rm -rf build dist
            python -m build
            echo "status=$?"
          } > CI_DIAGNOSTICS.txt 2>&1
      - name: Commit diagnostics and remove workflow
        shell: bash
        run: |
          rm .github/workflows/ci-diagnostics.yml
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add CI_DIAGNOSTICS.txt .github/workflows/ci-diagnostics.yml
          git commit -m "Record remaining CI diagnostics"
          git push origin HEAD:master
