name: One-shot non-profile semantic edits

on:
  push:
    branches:
      - master

permissions:
  contents: write

env:
  PIP_DISABLE_PIP_VERSION_CHECK: "1"

jobs:
  edit:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: master
          show-progress: false
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: pip
      - run: python -m pip install --quiet -e '.[dev]'
      - name: Apply isolated semantic edits
        run: |
          python - <<'PY'
          from pathlib import Path

          def replace(path_name: str, old: str, new: str) -> None:
              path = Path(path_name)
              text = path.read_text(encoding="utf-8")
              path.write_text(text.replace(old, new), encoding="utf-8")

          replace(
              "tests/unit/test_nmcli.py",
              "def test_nonzero_process_failure_preserves_safe_stderr_and_exit_code(\n"
              "    with_result: bool,\n"
              ") -> None:",
              "def test_nonzero_process_failure_preserves_safe_stderr_and_exit_code(\n"
              "    *,\n"
              "    with_result: bool,\n"
              ") -> None:",
          )
          replace(
              "tests/unit/test_nmcli_mutations_verification.py",
              "def test_delete_saved_profile_verifies_uuid_absence(profile_remains: bool) -> None:",
              "def test_delete_saved_profile_verifies_uuid_absence(*, profile_remains: bool) -> None:",
          )
          replace(
              "tests/unit/test_nmcli_mutations_verification.py",
              "def test_set_profile_autoconnect_emits_and_verifies_requested_value(enabled: bool) -> None:",
              "def test_set_profile_autoconnect_emits_and_verifies_requested_value(*, enabled: bool) -> None:",
          )
          replace(
              "tests/unit/test_nmcli_radio.py",
              "def test_radio_mutation_emits_command_and_verifies_state(enabled: bool) -> None:",
              "def test_radio_mutation_emits_command_and_verifies_state(*, enabled: bool) -> None:",
          )

          scan = Path("tests/unit/test_nmcli_scan.py")
          text = scan.read_text(encoding="utf-8")
          if "EXPECTED_ACCESS_POINT_COUNT" not in text:
              text = text.replace(
                  "NONZERO_EXIT = 10\n",
                  "NONZERO_EXIT = 10\n"
                  "EXPECTED_ACCESS_POINT_COUNT = 11\n"
                  "CHANNEL_14 = 14\n"
                  "CHANNEL_36 = 36\n",
              )
          text = text.replace("verify(len(access_points) == 11)", "verify(len(access_points) == EXPECTED_ACCESS_POINT_COUNT)")
          text = text.replace("verify(access_points[1].channel == 14)", "verify(access_points[1].channel == CHANNEL_14)")
          text = text.replace("verify(access_points[2].channel == 36)", "verify(access_points[2].channel == CHANNEL_36)")
          scan.write_text(text, encoding="utf-8")

          process = Path("tests/unit/test_process.py")
          text = process.read_text(encoding="utf-8")
          if "_EXPECTED_TERMINATION_WAITS" not in text:
              text = text.replace(
                  "_SIGNAL_EXIT_CODE = -9\n",
                  "_SIGNAL_EXIT_CODE = -9\n_EXPECTED_TERMINATION_WAITS = 2\n",
              )
          text = text.replace("argument_secret", "argument_value")
          text = text.replace("stdin_secret", "stdin_value")
          text = text.replace(
              "verify(process.wait_calls >= 2)",
              "verify(process.wait_calls >= _EXPECTED_TERMINATION_WAITS)",
          )
          process.write_text(text, encoding="utf-8")

          concurrency = Path("tests/unit/test_service_concurrency.py")
          text = concurrency.read_text(encoding="utf-8")
          if "EXPECTED_SECOND_VALUE" not in text:
              text = text.replace(
                  "if TYPE_CHECKING:\n",
                  "EXPECTED_SECOND_VALUE = 2\n\n\nif TYPE_CHECKING:\n",
                  1,
              )
          text = text.replace("== 2", "== EXPECTED_SECOND_VALUE")
          concurrency.write_text(text, encoding="utf-8")

          saved = Path("tests/tui/test_saved_screen.py")
          text = saved.read_text(encoding="utf-8")
          text = text.replace(
              "from textual.widgets import DataTable, Static",
              "from textual.widgets import Button, DataTable, Static",
          )
          old = (
              '            table.move_cursor(row=0)\n'
              '            await pilot.click("#connect")\n'
              '            await settle(pilot)\n'
              '            verify(isinstance(app.screen, MessageDialog))'
          )
          new = (
              '            table.move_cursor(row=0)\n'
              '            await settle(pilot)\n'
              '            verify(service.snapshot.selected_device is None)\n'
              '            screen = app.screen\n'
              '            verify(isinstance(screen, SavedNetworksScreen))\n'
              '            button = screen.query_one("#connect", Button)\n'
              '            screen.on_button_pressed(Button.Pressed(button))\n'
              '            await settle(pilot)\n'
              '            verify(isinstance(app.screen, MessageDialog))'
          )
          text = text.replace(old, new, 1)
          saved.write_text(text, encoding="utf-8")
          PY
      - name: Normalize formatting
        run: |
          ruff check --fix . || true
          black .
      - name: Remove temporary files
        run: |
          rm .github/workflows/final-semantic-fix.yml
          rm -f CI_DIAGNOSTICS.txt
      - name: Commit edits directly to master
        shell: bash
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m "Apply isolated non-profile CI fixes"
          git push origin HEAD:master
