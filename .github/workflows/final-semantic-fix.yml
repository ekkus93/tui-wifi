name: One-shot remaining semantic edits

on:
  push:
    branches:
      - master

permissions:
  contents: write

env:
  PIP_DISABLE_PIP_VERSION_CHECK: "1"

jobs:
  edit:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: master
          show-progress: false
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: pip
      - run: python -m pip install --quiet -e '.[dev]'
      - name: Apply deterministic semantic edits
        run: |
          python - <<'PY'
          from pathlib import Path
          import re

          def edit(path_name: str, edits: tuple[tuple[str, str], ...]) -> None:
              path = Path(path_name)
              text = path.read_text(encoding="utf-8")
              for old, new in edits:
                  text = text.replace(old, new)
              path.write_text(text, encoding="utf-8")

          edit(
              "tests/unit/test_nmcli.py",
              ((
                  "def test_nonzero_process_failure_preserves_safe_stderr_and_exit_code(\n"
                  "    with_result: bool,\n"
                  ") -> None:",
                  "def test_nonzero_process_failure_preserves_safe_stderr_and_exit_code(\n"
                  "    *,\n"
                  "    with_result: bool,\n"
                  ") -> None:",
              ),),
          )
          edit(
              "tests/unit/test_nmcli_mutations_verification.py",
              (
                  (
                      "def test_delete_saved_profile_verifies_uuid_absence(profile_remains: bool) -> None:",
                      "def test_delete_saved_profile_verifies_uuid_absence(*, profile_remains: bool) -> None:",
                  ),
                  (
                      "def test_set_profile_autoconnect_emits_and_verifies_requested_value(enabled: bool) -> None:",
                      "def test_set_profile_autoconnect_emits_and_verifies_requested_value(*, enabled: bool) -> None:",
                  ),
              ),
          )
          edit(
              "tests/unit/test_nmcli_radio.py",
              ((
                  "def test_radio_mutation_emits_command_and_verifies_state(enabled: bool) -> None:",
                  "def test_radio_mutation_emits_command_and_verifies_state(*, enabled: bool) -> None:",
              ),),
          )

          profiles = Path("tests/unit/test_nmcli_profiles.py")
          text = profiles.read_text(encoding="utf-8")
          text = re.sub(
              r"def queue_profile\(.*?\n\n(?=def test_saved_profile_list_filters)",
              "",
              text,
              flags=re.DOTALL,
          )
          matrix_pattern = re.compile(
              r"@pytest\.mark\.parametrize\(\n"
              r"    \(\n        \"key_mgmt\".*?"
              r"    asyncio\.run\(scenario\(\)\)\n",
              re.DOTALL,
          )
          matrix_replacement = '''@pytest.mark.parametrize(
              "case",
              [
                  ("wpa-psk", SecurityClass.WPA2_PERSONAL, "--", False, "Home", "wlan0"),
                  ("sae", SecurityClass.WPA3_PERSONAL, "", False, "Home", "wlan0"),
                  ("sae wpa-psk", SecurityClass.MIXED_PERSONAL, "wlan0", True, "Home", "wlan0"),
                  ("none", SecurityClass.OPEN, "--", False, "Home", ""),
                  ("wpa-eap", SecurityClass.ENTERPRISE, "wlan0", True, "Home", "wlan0"),
                  ("future-mode", SecurityClass.UNKNOWN, "--", False, "", ""),
              ],
          )
          def test_profile_detail_parsing_matrix(
              case: tuple[str, SecurityClass, str, bool, str, str],
          ) -> None:
              """Verify profile security, optional fields, and active-state parsing."""
              key_mgmt, security, device, expected_active, ssid, interface_name = case

              async def scenario() -> None:
                  runner = FakeProcessRunner()
                  runner.queue(
                      NMCLI_PATH,
                      profile_summary_command(),
                      process_result(stdout=f"Profile:{DEFAULT_UUID}:wifi:{device}:yes\\n"),
                  )
                  runner.queue(
                      NMCLI_PATH,
                      profile_detail_command(DEFAULT_UUID),
                      process_result(stdout=f"{ssid}\\n{key_mgmt}\\n{interface_name}\\nyes\\n"),
                  )
                  backend = NmcliWifiBackend(runner, NMCLI_PATH)

                  profile = (await backend.list_saved_wifi_profiles())[0]

                  verify(profile.security == security)
                  verify(profile.active is expected_active)
                  verify(profile.ssid == (ssid or None))
                  verify(profile.interface_name == (interface_name or None))
                  runner.assert_finished()

              asyncio.run(scenario())
          '''
          matrix_replacement = "\n".join(
              line[10:] if line.startswith("          ") else line
              for line in matrix_replacement.splitlines()
          ) + "\n"
          text, replacements = matrix_pattern.subn(matrix_replacement, text, count=1)
          if replacements != 1:
              raise SystemExit(f"profile matrix replacements={replacements}")
          text = text.replace(
              "def test_partial_profile_detail_fallbacks(\n"
              "    detail: str,\n"
              "    summary_value: str,\n"
              "    expected_autoconnect: bool,\n"
              "    expected_interface: str | None,\n"
              ") -> None:",
              "def test_partial_profile_detail_fallbacks(\n"
              "    detail: str,\n"
              "    summary_value: str,\n"
              "    *,\n"
              "    expected_autoconnect: bool,\n"
              "    expected_interface: str | None,\n"
              ") -> None:",
          )
          text = text.replace(
              'THIRD_UUID = "00000000-0000-0000-0000-000000000003"\n',
              'THIRD_UUID = "00000000-0000-0000-0000-000000000003"\n'
              'EXPECTED_ACTIVE_QUERY_COUNT = 2\n',
          )
          text = text.replace(
              "verify(len(runner.requests) == 2)",
              "verify(len(runner.requests) == EXPECTED_ACTIVE_QUERY_COUNT)",
          )
          profiles.write_text(text, encoding="utf-8")

          scan = Path("tests/unit/test_nmcli_scan.py")
          text = scan.read_text(encoding="utf-8")
          text = text.replace(
              "NONZERO_EXIT = 10\n",
              "NONZERO_EXIT = 10\n"
              "EXPECTED_ACCESS_POINT_COUNT = 11\n"
              "CHANNEL_14 = 14\n"
              "CHANNEL_36 = 36\n",
          )
          text = text.replace("verify(len(access_points) == 11)", "verify(len(access_points) == EXPECTED_ACCESS_POINT_COUNT)")
          text = text.replace("verify(access_points[1].channel == 14)", "verify(access_points[1].channel == CHANNEL_14)")
          text = text.replace("verify(access_points[2].channel == 36)", "verify(access_points[2].channel == CHANNEL_36)")
          scan.write_text(text, encoding="utf-8")

          process = Path("tests/unit/test_process.py")
          text = process.read_text(encoding="utf-8")
          text = text.replace(
              "_SIGNAL_EXIT_CODE = -9\n",
              "_SIGNAL_EXIT_CODE = -9\n_EXPECTED_TERMINATION_WAITS = 2\n",
          )
          text = text.replace("argument_secret", "argument_value")
          text = text.replace("stdin_secret", "stdin_value")
          text = text.replace("verify(process.wait_calls >= 2)", "verify(process.wait_calls >= _EXPECTED_TERMINATION_WAITS)")
          process.write_text(text, encoding="utf-8")

          concurrency = Path("tests/unit/test_service_concurrency.py")
          text = concurrency.read_text(encoding="utf-8")
          if "EXPECTED_SECOND_VALUE" not in text:
              text = text.replace("if TYPE_CHECKING:\n", "EXPECTED_SECOND_VALUE = 2\n\n\nif TYPE_CHECKING:\n", 1)
          text = text.replace("== 2", "== EXPECTED_SECOND_VALUE")
          concurrency.write_text(text, encoding="utf-8")

          saved = Path("tests/tui/test_saved_screen.py")
          text = saved.read_text(encoding="utf-8")
          text = text.replace(
              "from textual.widgets import DataTable, Static",
              "from textual.widgets import Button, DataTable, Static",
          )
          old = (
              '            table.move_cursor(row=0)\n'
              '            await pilot.click("#connect")\n'
              '            await settle(pilot)\n'
              '            verify(isinstance(app.screen, MessageDialog))'
          )
          new = (
              '            table.move_cursor(row=0)\n'
              '            await settle(pilot)\n'
              '            verify(service.snapshot.selected_device is None)\n'
              '            screen = app.screen\n'
              '            verify(isinstance(screen, SavedNetworksScreen))\n'
              '            button = screen.query_one("#connect", Button)\n'
              '            screen.on_button_pressed(Button.Pressed(button))\n'
              '            await settle(pilot)\n'
              '            verify(isinstance(app.screen, MessageDialog))'
          )
          text = text.replace(old, new, 1)
          saved.write_text(text, encoding="utf-8")
          PY
      - name: Normalize formatting
        run: |
          ruff check --fix . || true
          black .
      - name: Remove workflow and old diagnostics
        run: |
          rm .github/workflows/final-semantic-fix.yml
          rm -f CI_DIAGNOSTICS.txt
      - name: Commit edits directly to master
        shell: bash
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m "Apply remaining semantic CI edits"
          git push origin HEAD:master
