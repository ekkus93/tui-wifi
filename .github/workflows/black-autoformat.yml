name: One-shot Black autoformat

on:
  push:
    branches:
      - master

permissions:
  contents: write

jobs:
  format:
    if: github.event.head_commit.message == 'Run Black autoformat'
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          show-progress: false

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: pip

      - name: Install development dependencies
        run: python -m pip install --quiet -e '.[dev]'

      - name: Apply Black formatting
        run: black .

      - name: Verify Ruff
        run: ruff check .

      - name: Run tests
        run: pytest -m 'not real_network'

      - name: Enforce critical coverage
        run: python scripts/check_critical_coverage.py coverage.json

      - name: Remove one-shot files
        run: |
          rm .github/workflows/black-autoformat.yml
          rm .black-autoformat-trigger

      - name: Commit canonical formatting
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          if git diff --cached --quiet; then
            echo 'Black reported no changes; removing temporary files only.'
          fi
          git commit -m 'Apply canonical Black formatting'
          git push origin HEAD:master
