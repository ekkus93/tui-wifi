name: One-shot hosted CI verification

on:
  push:
    branches:
      - master

permissions:
  contents: write

env:
  PYTHONWARNINGS: error
  PIP_DISABLE_PIP_VERSION_CHECK: "1"

jobs:
  verify:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: master
          show-progress: false
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: pip
      - run: python -m pip install --quiet -e '.[dev]'
      - name: Run all gates
        shell: bash
        run: |
          set +e
          overall=0
          {
            echo '=== BLACK ==='
            black --check .
            status=$?
            echo "status=$status"
            [ "$status" -eq 0 ] || overall=1
            echo
            echo '=== RUFF ==='
            ruff check . --output-format concise
            status=$?
            echo "status=$status"
            [ "$status" -eq 0 ] || overall=1
            echo
            echo '=== MYPY ==='
            mypy src/tui_wifi
            status=$?
            echo "status=$status"
            [ "$status" -eq 0 ] || overall=1
            echo
            echo '=== PYTEST ==='
            pytest -m 'not real_network' -q --tb=short
            status=$?
            echo "status=$status"
            [ "$status" -eq 0 ] || overall=1
            echo
            echo '=== CRITICAL COVERAGE ==='
            python scripts/check_critical_coverage.py coverage.json
            status=$?
            echo "status=$status"
            [ "$status" -eq 0 ] || overall=1
            echo
            echo '=== BUILD ==='
            python -m build
            status=$?
            echo "status=$status"
            [ "$status" -eq 0 ] || overall=1
            echo
            echo "overall_status=$overall"
          } > CI_VERIFICATION.txt 2>&1
      - name: Commit report and remove workflow
        shell: bash
        run: |
          rm .github/workflows/ci-verify-once.yml
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m "Record hosted CI verification"
          git push origin HEAD:master
