name: Unit Test Expansion 1 Ralph Pass

on:
  push:
    branches:
      - master

permissions:
  contents: write

env:
  PIP_DISABLE_PIP_VERSION_CHECK: "1"
  PYTHONWARNINGS: error

jobs:
  implement-and-audit:
    if: github.actor != 'github-actions[bot]' && github.event.head_commit.message == 'Execute Unit Test Expansion 1'
    runs-on: ubuntu-latest
    steps:
      - name: Check out master
        uses: actions/checkout@v6
        with:
          ref: master
          show-progress: false

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: pip

      - name: Reconstruct and verify implementation payload
        shell: bash
        run: |
          cat .github/unit-tests1-payload/chunk-* > /tmp/unit-tests1-payload.b64
          echo "a1767d6c047ab9e3b65276c23c28b819b2cd3a28de1ac5019e2b8e89e274c8f4  /tmp/unit-tests1-payload.b64" | sha256sum --check
          base64 --decode /tmp/unit-tests1-payload.b64 > /tmp/unit-tests1-payload.tar.gz
          echo "423816c660df01099148cd08758c0323637b498e70483567dccd09e9cdd35731  /tmp/unit-tests1-payload.tar.gz" | sha256sum --check
          tar --extract --gzip --file /tmp/unit-tests1-payload.tar.gz --directory .

      - name: Install development dependencies
        run: python -m pip install --quiet -e '.[dev]'

      - name: Apply deterministic formatting and safe fixes
        run: |
          ruff check --fix . || true
          black .

      - name: Remove one-shot staging machinery
        run: |
          rm -rf .github/unit-tests1-payload
          rm -f .github/unit-tests1-trigger
          rm .github/workflows/unit-tests1-ralph.yml

      - name: Run strict implementation audit
        shell: bash
        run: |
          set +e
          overall=0
          {
            echo '=== BLACK ==='
            black --check .
            status=$?
            echo "status=$status"
            if [ "$status" -ne 0 ]; then overall=1; fi

            echo
            echo '=== RUFF ==='
            ruff check . --output-format concise
            status=$?
            echo "status=$status"
            if [ "$status" -ne 0 ]; then overall=1; fi

            echo
            echo '=== MYPY ==='
            mypy src/tui_wifi
            status=$?
            echo "status=$status"
            if [ "$status" -ne 0 ]; then overall=1; fi

            echo
            echo '=== PYTEST ==='
            pytest -m 'not real_network'
            status=$?
            echo "status=$status"
            if [ "$status" -ne 0 ]; then overall=1; fi

            echo
            echo '=== CRITICAL COVERAGE ==='
            python scripts/check_critical_coverage.py coverage.json
            status=$?
            echo "status=$status"
            if [ "$status" -ne 0 ]; then overall=1; fi

            echo
            echo '=== BUILD ==='
            rm -rf build dist
            python -m build
            status=$?
            echo "status=$status"
            if [ "$status" -ne 0 ]; then overall=1; fi

            echo
            echo '=== WHEEL INSTALL ==='
            python -m venv /tmp/tui-wifi-unit-tests1-wheel
            /tmp/tui-wifi-unit-tests1-wheel/bin/python -m pip install --quiet dist/*.whl
            /tmp/tui-wifi-unit-tests1-wheel/bin/python -m pip check
            /tmp/tui-wifi-unit-tests1-wheel/bin/wifi-tui --version
            status=$?
            echo "status=$status"
            if [ "$status" -ne 0 ]; then overall=1; fi

            echo
            echo "overall_status=$overall"
          } > UNIT_TESTS1_AUDIT.txt 2>&1
          exit 0

      - name: Commit implementation directly to master
        shell: bash
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m "Implement Unit Test Expansion 1"
          git push origin HEAD:master
