name: Complete Python 3.10 Diagnostics

on:
  push:
    branches:
      - master

permissions:
  contents: write

env:
  PYTHONWARNINGS: error
  PIP_DISABLE_PIP_VERSION_CHECK: "1"

jobs:
  diagnose:
    if: github.event.head_commit.message == 'Run complete Python 3.10 diagnostics'
    runs-on: ubuntu-latest
    steps:
      - name: Check out master
        uses: actions/checkout@v6
        with:
          ref: master
          show-progress: false

      - name: Apply final compatibility change set
        continue-on-error: true
        shell: bash
        run: |
          report=/tmp/PYTHON310_FINAL_DIAGNOSTICS.txt
          : > "$report"
          python - <<'PY' >> "$report" 2>&1
          from pathlib import Path

          def replace_exact(path: str, old: str, new: str, *, count: int = -1) -> None:
              file_path = Path(path)
              text = file_path.read_text(encoding="utf-8")
              if old not in text:
                  raise SystemExit(f"expected text not found in {path}: {old!r}")
              file_path.write_text(text.replace(old, new, count), encoding="utf-8")

          Path("src/tui_wifi/compat.py").write_text(
              '''# Copyright (c) 2026 Phillip Chin
          """Provide compatibility types for supported Python versions."""

          from __future__ import annotations

          from enum import Enum


          class StrEnum(str, Enum):
              """Provide the explicit-value string enum behavior used by tui-wifi."""

              def __str__(self) -> str:
                  """Return the enum value as its user-facing string."""
                  return str.__str__(self)

              def __format__(self, format_spec: str) -> str:
                  """Format the enum value exactly like a normal string."""
                  return str.__format__(self, format_spec)
          ''',
              encoding="utf-8",
          )
          replace_exact(
              "src/tui_wifi/models.py",
              "from datetime import UTC, datetime\nfrom enum import StrEnum\n",
              "from datetime import datetime, timezone\n\nfrom tui_wifi.compat import StrEnum\n",
          )
          replace_exact("src/tui_wifi/models.py", "datetime.now(UTC)", "datetime.now(timezone.utc)")
          replace_exact(
              "src/tui_wifi/services/wifi.py",
              "from datetime import UTC, datetime",
              "from datetime import datetime, timezone",
          )
          replace_exact(
              "src/tui_wifi/services/wifi.py",
              "datetime.now(UTC)",
              "datetime.now(timezone.utc)",
          )
          replace_exact(
              "src/tui_wifi/errors.py",
              "from enum import StrEnum\nfrom typing import TypedDict, Unpack\n",
              "from typing import TypedDict\n\nfrom typing_extensions import Unpack\n\nfrom tui_wifi.compat import StrEnum\n",
          )
          replace_exact(
              "tests/factories.py",
              "from typing import TypedDict, Unpack\n",
              "from typing import TypedDict\n\nfrom typing_extensions import Unpack\n",
          )
          replace_exact(
              "src/tui_wifi/process/runner.py",
              "except TimeoutError",
              "except asyncio.TimeoutError",
          )
          Path("tests/unit/test_compat.py").write_text(
              '''# Copyright (c) 2026 Phillip Chin
          """Verify compatibility types shared across supported Python versions."""

          from __future__ import annotations

          from tests.assertions import verify
          from tui_wifi.compat import StrEnum


          class ExampleValue(StrEnum):
              """Provide one explicit string-enum value for compatibility testing."""

              VALUE = "value"


          def test_string_enum_matches_required_string_behavior() -> None:
              """Verify equality, conversion, and formatting match normal strings."""
              verify(ExampleValue.VALUE == "value")
              verify(str(ExampleValue.VALUE) == "value")
              verify(f"{ExampleValue.VALUE:>7}" == "  value")
          ''',
              encoding="utf-8",
          )
          replace_exact("pyproject.toml", 'requires-python = ">=3.11"', 'requires-python = ">=3.10"')
          replace_exact(
              "pyproject.toml",
              '  "Programming Language :: Python :: 3.11",',
              '  "Programming Language :: Python :: 3.10",\n  "Programming Language :: Python :: 3.11",',
          )
          replace_exact(
              "pyproject.toml",
              'dependencies = ["textual>=8.2,<9"]',
              'dependencies = ["textual>=8.2,<9", "typing-extensions>=4.12,<5"]',
          )
          replace_exact("pyproject.toml", 'target-version = ["py311"]', 'target-version = ["py310"]')
          replace_exact("pyproject.toml", 'target-version = "py311"', 'target-version = "py310"')
          replace_exact("pyproject.toml", 'python_version = "3.11"', 'python_version = "3.10"')
          replace_exact(
              ".github/workflows/ci.yml",
              '          python-version: "3.11"',
              '          python-version: "3.10"',
              count=1,
          )
          replace_exact(
              ".github/workflows/ci.yml",
              '        python-version: ["3.11", "3.12", "3.13"]',
              '        python-version: ["3.10", "3.11", "3.12", "3.13"]',
          )
          for path in ("README.md", "CONTRIBUTING.md", "docs/TODO.md", "docs/SPEC.md", "docs/UNIT_TESTS1_TODO.md"):
              file_path = Path(path)
              text = file_path.read_text(encoding="utf-8")
              for old, new in (
                  ("Python 3.11 or newer", "Python 3.10 or newer"),
                  ("Python 3.11+", "Python 3.10+"),
                  ("Python 3.11, 3.12, and 3.13", "Python 3.10, 3.11, 3.12, and 3.13"),
                  ("Python 3.11–3.13", "Python 3.10–3.13"),
              ):
                  text = text.replace(old, new)
              file_path.write_text(text, encoding="utf-8")
          print("final compatibility changes applied")
          PY
          echo "apply_status=$?" >> "$report"

      - name: Set up Python 3.10
        if: always()
        uses: actions/setup-python@v6
        with:
          python-version: "3.10"
          cache: pip

      - name: Capture Python 3.10 validation
        if: always()
        continue-on-error: true
        shell: bash
        run: |
          report=/tmp/PYTHON310_FINAL_DIAGNOSTICS.txt
          set +e
          for command in \
            "python -m pip install --upgrade pip" \
            "python -m pip install -e '.[dev]'" \
            "black ." \
            "ruff check --fix ." \
            "black --check ." \
            "ruff check ." \
            "mypy src/tui_wifi" \
            "pytest -m 'not real_network'" \
            "python scripts/check_critical_coverage.py coverage.json" \
            "python -m build"; do
            echo >> "$report"
            echo "=== PYTHON 3.10: $command ===" >> "$report"
            bash -lc "$command" >> "$report" 2>&1
            echo "status=$?" >> "$report"
          done

      - name: Set up Python 3.13
        if: always()
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: pip

      - name: Capture Python 3.13 validation
        if: always()
        continue-on-error: true
        shell: bash
        run: |
          report=/tmp/PYTHON310_FINAL_DIAGNOSTICS.txt
          set +e
          for command in \
            "python -m pip install -e '.[dev]'" \
            "black --check ." \
            "ruff check ." \
            "mypy src/tui_wifi" \
            "pytest -m 'not real_network'" \
            "python scripts/check_critical_coverage.py coverage.json"; do
            echo >> "$report"
            echo "=== PYTHON 3.13: $command ===" >> "$report"
            bash -lc "$command" >> "$report" 2>&1
            echo "status=$?" >> "$report"
          done

      - name: Commit only the final diagnostic report
        if: always()
        shell: bash
        run: |
          report=/tmp/PYTHON310_FINAL_DIAGNOSTICS.txt
          git reset --hard HEAD
          cp "$report" PYTHON310_FINAL_DIAGNOSTICS.txt
          rm .github/workflows/python310-diagnostic-final.yml
          rm .github/python310-diagnostic-final-trigger
          rm -f PYTHON310_DIAGNOSTICS.txt
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m "Record final Python 3.10 diagnostics"
          git push origin HEAD:master
