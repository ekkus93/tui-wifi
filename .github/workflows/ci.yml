name: CI/CD

on:
  push:
    branches:
      - "**"
    tags:
      - "v*"
  pull_request:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read

env:
  PYTHONWARNINGS: error
  PIP_DISABLE_PIP_VERSION_CHECK: "1"

jobs:
  lint:
    name: Ruff lint and format
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          show-progress: false

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: pip

      - name: Install development dependencies
        run: python -m pip install --quiet -e '.[dev]'

      - name: Check formatting
        run: ruff format --check .

      - name: Run lint checks
        run: ruff check .

  type-check:
    name: Mypy strict type checking
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          show-progress: false

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip

      - name: Install development dependencies
        run: python -m pip install --quiet -e '.[dev]'

      - name: Run static type checks
        run: mypy src/tui_wifi

  test:
    name: Test Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          show-progress: false

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install development dependencies
        run: python -m pip install --quiet -e '.[dev]'

      - name: Run tests with warnings as errors
        run: pytest -m 'not real_network'

  diagnostics:
    name: Strict-check diagnostics
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    env:
      GH_TOKEN: ${{ github.token }}
      PR_NUMBER: ${{ github.event.pull_request.number }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          show-progress: false

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip

      - name: Install development dependencies
        run: python -m pip install --quiet -e '.[dev]'

      - name: Collect exact strict-check output
        id: collect
        shell: bash
        run: |
          set +e
          status=0
          {
            echo '### `ruff format --check .`'
            echo '```text'
            ruff format --check . || status=1
            echo '```'
            echo
            echo '### `ruff check .`'
            echo '```text'
            ruff check . || status=1
            echo '```'
            echo
            echo '### `mypy src/tui_wifi`'
            echo '```text'
            mypy src/tui_wifi || status=1
            echo '```'
            echo
            echo '### `pytest -m "not real_network"`'
            echo '```text'
            pytest -m 'not real_network' || status=1
            echo '```'
          } > /tmp/strict-diagnostics.md 2>&1
          echo "status=$status" >> "$GITHUB_OUTPUT"

      - name: Post diagnostics to pull request
        if: steps.collect.outputs.status != '0'
        run: gh pr comment "$PR_NUMBER" --body-file /tmp/strict-diagnostics.md

      - name: Fail when diagnostics found defects
        if: steps.collect.outputs.status != '0'
        run: exit 1

  package:
    name: Validate package
    needs: [lint, type-check, test]
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          show-progress: false

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: pip

      - name: Build wheel and source distribution
        run: |
          python -m pip install --quiet 'build>=1.2,<2'
          python -m build

      - name: Install and verify the wheel
        shell: bash
        run: |
          python -m venv /tmp/tui-wifi-wheel-test
          /tmp/tui-wifi-wheel-test/bin/python -m pip install --quiet dist/*.whl
          /tmp/tui-wifi-wheel-test/bin/python -m pip check
          /tmp/tui-wifi-wheel-test/bin/wifi-tui --version

      - name: Confirm source and wheel assets exist
        shell: bash
        run: |
          test "$(find dist -maxdepth 1 -name '*.whl' -type f | wc -l)" -eq 1
          test "$(find dist -maxdepth 1 -name '*.tar.gz' -type f | wc -l)" -eq 1

  release:
    name: Publish tagged release assets
    if: startsWith(github.ref, 'refs/tags/v')
    needs: package
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Check out tagged revision
        uses: actions/checkout@v6
        with:
          show-progress: false

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: pip

      - name: Verify tag matches package version
        shell: bash
        run: |
          python - <<'PY'
          import os
          import tomllib
          from pathlib import Path

          with Path("pyproject.toml").open("rb") as handle:
              version = tomllib.load(handle)["project"]["version"]

          tag = os.environ["GITHUB_REF_NAME"]
          expected = f"v{version}"
          if tag != expected:
              raise SystemExit(
                  f"release tag {tag!r} does not match package version {version!r}; "
                  f"expected {expected!r}"
              )
          PY

      - name: Build release assets
        run: |
          python -m pip install --quiet 'build>=1.2,<2'
          python -m build

      - name: Create GitHub release and attach assets
        shell: bash
        run: |
          gh release create "$GITHUB_REF_NAME" \
            dist/*.whl \
            dist/*.tar.gz \
            --verify-tag \
            --title "$GITHUB_REF_NAME" \
            --generate-notes
