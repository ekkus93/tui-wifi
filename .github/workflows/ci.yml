name: CI/CD

on:
  push:
    branches:
      - "**"
    tags:
      - "v*"
  pull_request:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read

env:
  PYTHONWARNINGS: error
  PIP_DISABLE_PIP_VERSION_CHECK: "1"

jobs:
  lint:
    name: Black format and Ruff lint
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          show-progress: false

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: pip

      - name: Install development dependencies
        run: python -m pip install --quiet -e '.[dev]'

      - name: Check formatting
        run: black --check --diff .

      - name: Run all Ruff checks
        run: ruff check .

  type-check:
    name: Mypy strict type checking
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          show-progress: false

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.10"
          cache: pip

      - name: Install development dependencies
        run: python -m pip install --quiet -e '.[dev]'

      - name: Run static type checks
        run: mypy src/tui_wifi

  test:
    name: Test Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          show-progress: false

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install development dependencies
        run: python -m pip install --quiet -e '.[dev]'

      - name: Run tests with warnings as errors
        run: pytest -m 'not real_network'

      - name: Enforce critical module branch coverage
        run: python scripts/check_critical_coverage.py coverage.json

  package:
    name: Validate package
    needs: [lint, type-check, test]
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          show-progress: false

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: pip

      - name: Build wheel and source distribution
        run: |
          python -m pip install --quiet 'build>=1.2,<2'
          python -m build

      - name: Install and verify the wheel
        shell: bash
        run: |
          python -m venv /tmp/tui-wifi-wheel-test
          /tmp/tui-wifi-wheel-test/bin/python -m pip install --quiet dist/*.whl
          /tmp/tui-wifi-wheel-test/bin/python -m pip check
          /tmp/tui-wifi-wheel-test/bin/tui-wifi --version

      - name: Confirm source and wheel assets exist
        shell: bash
        run: |
          test "$(find dist -maxdepth 1 -name '*.whl' -type f | wc -l)" -eq 1
          test "$(find dist -maxdepth 1 -name '*.tar.gz' -type f | wc -l)" -eq 1

  release:
    name: Publish tagged release assets
    if: startsWith(github.ref, 'refs/tags/v')
    needs: package
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Check out tagged revision
        uses: actions/checkout@v6
        with:
          show-progress: false

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: pip

      - name: Verify tag matches package version
        shell: bash
        run: |
          python - <<'PY'
          import os
          import tomllib
          from pathlib import Path

          with Path("pyproject.toml").open("rb") as handle:
              version = tomllib.load(handle)["project"]["version"]

          tag = os.environ["GITHUB_REF_NAME"]
          expected = f"v{version}"
          if tag != expected:
              raise SystemExit(
                  f"release tag {tag!r} does not match package version {version!r}; "
                  f"expected {expected!r}"
              )
          PY

      - name: Build release assets
        run: |
          python -m pip install --quiet 'build>=1.2,<2'
          python -m build

      - name: Create GitHub release and attach assets
        shell: bash
        run: |
          gh release create "$GITHUB_REF_NAME" \
            dist/*.whl \
            dist/*.tar.gz \
            --verify-tag \
            --title "$GITHUB_REF_NAME" \
            --generate-notes
