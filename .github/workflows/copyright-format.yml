name: One-shot copyright and formatting

on:
  push:
    branches:
      - master

permissions:
  contents: write

env:
  PIP_DISABLE_PIP_VERSION_CHECK: "1"

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: master
          show-progress: false
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: pip
      - run: python -m pip install --quiet -e '.[dev]'
      - name: Add required copyright notices
        run: |
          python - <<'PY'
          from pathlib import Path

          notice = "# Copyright (c) 2026 Phillip Chin\n"
          for root in (Path("scripts"), Path("src"), Path("tests")):
              for path in root.rglob("*.py"):
                  text = path.read_text(encoding="utf-8")
                  if not text.startswith("# Copyright"):
                      path.write_text(notice + text, encoding="utf-8")
          PY
      - name: Apply formatting and safe fixes
        run: |
          ruff check --fix . || true
          black .
      - name: Remove temporary files
        run: |
          rm .github/workflows/copyright-format.yml
          rm -f CI_DIAGNOSTICS.txt
      - name: Commit directly to master
        shell: bash
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m "Add copyright notices and normalize formatting"
          git push origin HEAD:master
