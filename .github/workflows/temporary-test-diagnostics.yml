name: Temporary systematic lint fixes

on:
  pull_request:
    branches:
      - master

permissions:
  contents: write

env:
  PIP_DISABLE_PIP_VERSION_CHECK: "1"

jobs:
  fix:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: agent/enforce-zero-warnings
          show-progress: false
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: pip
      - run: python -m pip install --quiet -e '.[dev]'
      - name: Apply systematic source fixes
        run: |
          python scripts/systematic_lint_fix.py
          python -m compileall -q src tests
          ruff check --fix --unsafe-fixes . || true
          black .
          python -m compileall -q src tests
      - name: Commit validated fixes
        shell: bash
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add src tests
          if git diff --cached --quiet; then
            exit 0
          fi
          git commit -m "Apply systematic lint fixes"
          git push origin HEAD:agent/enforce-zero-warnings
