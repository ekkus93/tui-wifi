name: Temporary complete lint diagnostics

on:
  push:
    branches:
      - agent/enforce-zero-warnings

permissions:
  contents: write

env:
  PIP_DISABLE_PIP_VERSION_CHECK: "1"

jobs:
  diagnose:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: agent/enforce-zero-warnings
          show-progress: false
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: pip
      - run: python -m pip install --quiet -e '.[dev]'
      - name: Capture current formatting and lint output
        shell: bash
        run: |
          set +e
          status=0
          {
            echo '=== BLACK ==='
            black --check . || status=1
            echo
            echo '=== RUFF ==='
            ruff check . --output-format concise || status=1
          } > STRICT_DIAGNOSTICS.txt 2>&1
          printf '\nexit_status=%s\n' "$status" >> STRICT_DIAGNOSTICS.txt
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add STRICT_DIAGNOSTICS.txt
          if git diff --cached --quiet; then
            exit 0
          fi
          git commit -m "Refresh complete lint diagnostics"
          git push origin HEAD:agent/enforce-zero-warnings
