name: Temporary Ruff diagnostics

on:
  push:
    branches:
      - agent/enforce-zero-warnings

permissions:
  contents: write

env:
  PIP_DISABLE_PIP_VERSION_CHECK: "1"

jobs:
  diagnose:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: agent/enforce-zero-warnings
          show-progress: false
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: pip
      - run: python -m pip install --quiet -e '.[dev]'
      - name: Capture full Ruff output
        shell: bash
        run: |
          set +e
          ruff check . --output-format concise > STRICT_DIAGNOSTICS.txt 2>&1
          status=$?
          printf '\nexit_status=%s\n' "$status" >> STRICT_DIAGNOSTICS.txt
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add STRICT_DIAGNOSTICS.txt
          git commit -m "Capture complete Ruff diagnostics"
          git push origin HEAD:agent/enforce-zero-warnings
