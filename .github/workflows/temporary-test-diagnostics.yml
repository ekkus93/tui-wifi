name: Temporary systematic lint fixes

on:
  push:
    branches:
      - agent/enforce-zero-warnings

permissions:
  contents: write

env:
  PIP_DISABLE_PIP_VERSION_CHECK: "1"

jobs:
  fix:
    if: github.event.head_commit.message != 'Apply systematic lint fixes'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: agent/enforce-zero-warnings
          show-progress: false
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: pip
      - run: python -m pip install --quiet -e '.[dev]'
      - name: Apply and validate systematic fixes
        id: transform
        shell: bash
        run: |
          set +e
          {
            python - <<'PY'
            from __future__ import annotations

            import ast
            from pathlib import Path

            roots = (Path("src"), Path("tests"))
            for package in (Path("tests/unit"), Path("tests/integration"), Path("tests/tui")):
                init = package / "__init__.py"
                if not init.exists():
                    init.write_text(
                        f'"""Provide the {package.name} test package."""\n',
                        encoding="utf-8",
                    )

            def sentence(name: str, kind: str) -> str:
                words = name.strip("_").replace("_", " ") or "object"
                special = {
                    "__init__": "Initialize the instance.",
                    "__str__": "Return the user-facing string representation.",
                    "__repr__": "Return the diagnostic representation.",
                    "__aenter__": "Enter the asynchronous context.",
                    "__aexit__": "Exit the asynchronous context.",
                }
                if name in special:
                    return special[name]
                if kind == "test":
                    return f"Verify {words}."
                if kind == "class":
                    return f"Represent {words}."
                return f"Perform {words}."

            def add_docstrings(path: Path) -> None:
                text = path.read_text(encoding="utf-8")
                tree = ast.parse(text)
                lines = text.splitlines()
                insertions: list[tuple[int, str]] = []
                if ast.get_docstring(tree, clean=False) is None:
                    label = path.stem.replace("_", " ")
                    if path.name == "__init__.py":
                        module_doc = f'"""Provide the {path.parent.name} package."""'
                    elif path.parts[0] == "tests":
                        module_doc = f'"""Verify {label} behavior."""'
                    else:
                        module_doc = f'"""Provide {label} functionality."""'
                    insertions.append((0, module_doc))

                for node in ast.walk(tree):
                    if not isinstance(node, (ast.ClassDef, ast.FunctionDef, ast.AsyncFunctionDef)):
                        continue
                    if ast.get_docstring(node, clean=False) is not None or not node.body:
                        continue
                    if node.body[0].lineno == node.lineno:
                        continue
                    kind = "class" if isinstance(node, ast.ClassDef) else "function"
                    if path.parts[0] == "tests" and kind == "function":
                        kind = "test"
                    index = node.body[0].lineno - 1
                    indent = " " * (node.col_offset + 4)
                    insertions.append((index, f'{indent}"""{sentence(node.name, kind)}"""'))

                for index, content in sorted(insertions, reverse=True):
                    lines.insert(index, content)
                path.write_text("\n".join(lines) + "\n", encoding="utf-8")

            for root in roots:
                for source in sorted(root.rglob("*.py")):
                    add_docstrings(source)
            PY
            python -m compileall -q src tests
            ruff check --fix --unsafe-fixes . || true
            black .
            python -m compileall -q src tests
          } > /tmp/fix-output.txt 2>&1
          status=$?
          echo "status=$status" >> "$GITHUB_OUTPUT"
          if [ "$status" -ne 0 ]; then
            git reset --hard HEAD
            cp /tmp/fix-output.txt SYSTEMATIC_FIX_FAILURE.txt
          fi
      - name: Commit validated result or failure report
        shell: bash
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          if [ "${{ steps.transform.outputs.status }}" = "0" ]; then
            git add src tests
          else
            git add SYSTEMATIC_FIX_FAILURE.txt
          fi
          if git diff --cached --quiet; then
            exit 0
          fi
          git commit -m "Apply systematic lint fixes"
          git push origin HEAD:agent/enforce-zero-warnings
