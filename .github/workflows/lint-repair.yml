name: Temporary strict lint repair

on:
  push:
    branches:
      - master

permissions:
  contents: write

env:
  PIP_DISABLE_PIP_VERSION_CHECK: "1"
  PYTHONWARNINGS: error

jobs:
  repair:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: master
          show-progress: false
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: pip
      - name: Install dependencies
        run: python -m pip install --quiet -e '.[dev]' 'libcst>=1.8,<2'
      - name: Apply structural repairs
        run: python .github/lint_repair.py
      - name: Apply supported formatter and linter transformations
        run: |
          ruff check --fix --unsafe-fixes . || true
          black .
          python -m compileall -q src tests
      - name: Remove one-time repair machinery
        run: rm .github/lint_repair.py .github/workflows/lint-repair.yml
      - name: Capture strict gate results
        shell: bash
        run: |
          set +e
          {
            echo '=== BLACK ==='
            black --check .
            echo "status=$?"
            echo
            echo '=== RUFF ==='
            ruff check . --output-format concise
            echo "status=$?"
            echo
            echo '=== MYPY ==='
            mypy src/tui_wifi
            echo "status=$?"
            echo
            echo '=== PYTEST ==='
            pytest -m 'not real_network'
            echo "status=$?"
          } > STRICT_GATE_RESULTS.txt 2>&1
          exit 0
      - name: Commit repairs directly to master
        shell: bash
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m "Apply strict lint repairs"
          git push origin HEAD:master
