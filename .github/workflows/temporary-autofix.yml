name: Temporary Ruff autofix

on:
  push:
    branches:
      - agent/enforce-zero-warnings

permissions:
  contents: write

env:
  PIP_DISABLE_PIP_VERSION_CHECK: "1"

jobs:
  autofix:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: agent/enforce-zero-warnings
          show-progress: false
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: pip
      - run: python -m pip install --quiet -e '.[dev]'
      - name: Apply Ruff formatting and safe fixes
        run: |
          ruff format .
          ruff check --fix . || true
      - name: Commit mechanical fixes
        shell: bash
        run: |
          if git diff --quiet; then
            exit 0
          fi
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add .
          git commit -m "Apply Ruff formatting and safe fixes"
          git push origin HEAD:agent/enforce-zero-warnings
