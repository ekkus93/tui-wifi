name: Temporary full CI audit

on:
  push:
    branches:
      - master

permissions:
  contents: write

env:
  PIP_DISABLE_PIP_VERSION_CHECK: "1"
  PYTHONWARNINGS: error

jobs:
  audit:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: master
          show-progress: false

      - name: Set up Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
      - name: Test Python 3.11
        id: py311
        continue-on-error: true
        run: |
          python -m pip install --quiet -e '.[dev]'
          pytest -m 'not real_network'

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
      - name: Test Python 3.12
        id: py312
        continue-on-error: true
        run: |
          python -m pip install --quiet -e '.[dev]'
          pytest -m 'not real_network'

      - name: Set up Python 3.13
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: pip
      - name: Test and analyze Python 3.13
        id: py313
        continue-on-error: true
        run: |
          python -m pip install --quiet -e '.[dev]'
          black --check .
          ruff check .
          mypy src/tui_wifi
          pytest -m 'not real_network'

      - name: Build and verify package
        id: package
        continue-on-error: true
        run: |
          rm -rf build dist
          python -m build
          python -m venv /tmp/tui-wifi-wheel-test
          /tmp/tui-wifi-wheel-test/bin/python -m pip install --quiet dist/*.whl
          /tmp/tui-wifi-wheel-test/bin/python -m pip check
          /tmp/tui-wifi-wheel-test/bin/wifi-tui --version
          test "$(find dist -maxdepth 1 -name '*.whl' -type f | wc -l)" -eq 1
          test "$(find dist -maxdepth 1 -name '*.tar.gz' -type f | wc -l)" -eq 1

      - name: Record outcomes and remove temporary workflow
        shell: bash
        env:
          PY311: ${{ steps.py311.outcome }}
          PY312: ${{ steps.py312.outcome }}
          PY313: ${{ steps.py313.outcome }}
          PACKAGE: ${{ steps.package.outcome }}
        run: |
          cat > FULL_CI_RESULTS.md <<EOF
          # Full CI audit

          - Python 3.11 tests: $PY311
          - Python 3.12 tests: $PY312
          - Python 3.13 tests/lint/types: $PY313
          - Package build/install verification: $PACKAGE
          EOF
          rm .github/workflows/full-ci-audit.yml
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m "Record full CI audit"
          git push origin HEAD:master
