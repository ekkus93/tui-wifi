name: One-shot profile test fix

on:
  push:
    branches:
      - master

permissions:
  contents: write

env:
  PYTHONWARNINGS: error
  PIP_DISABLE_PIP_VERSION_CHECK: "1"

jobs:
  fix:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: master
          show-progress: false
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: pip
      - run: python -m pip install --quiet -e '.[dev]'
      - name: Rewrite profile tests with structured cases
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path("tests/unit/test_nmcli_profiles.py")
          lines = path.read_text(encoding="utf-8").splitlines()

          def find_start(prefix: str, start: int = 0) -> int:
              for index in range(start, len(lines)):
                  if lines[index].startswith(prefix):
                      return index
              raise SystemExit(f"missing prefix: {prefix}")

          helper_start = find_start("def queue_profile(")
          helper_end = find_start("def test_saved_profile_list_filters", helper_start)
          del lines[helper_start:helper_end]

          matrix_start = -1
          for index, line in enumerate(lines):
              if line == "@pytest.mark.parametrize(" and "key_mgmt" in "\n".join(lines[index : index + 12]):
                  matrix_start = index
                  break
          if matrix_start < 0:
              raise SystemExit("profile matrix start not found")
          matrix_end = matrix_start
          while matrix_end < len(lines) and lines[matrix_end] != "    asyncio.run(scenario())":
              matrix_end += 1
          if matrix_end == len(lines):
              raise SystemExit("profile matrix end not found")
          matrix_end += 1

          replacement = '''@pytest.mark.parametrize(
              "case",
              [
                  ("wpa-psk", SecurityClass.WPA2_PERSONAL, "--", False, "Home", "wlan0"),
                  ("sae", SecurityClass.WPA3_PERSONAL, "", False, "Home", "wlan0"),
                  ("sae wpa-psk", SecurityClass.MIXED_PERSONAL, "wlan0", True, "Home", "wlan0"),
                  ("none", SecurityClass.OPEN, "--", False, "Home", ""),
                  ("wpa-eap", SecurityClass.ENTERPRISE, "wlan0", True, "Home", "wlan0"),
                  ("future-mode", SecurityClass.UNKNOWN, "--", False, "", ""),
              ],
          )
          def test_profile_detail_parsing_matrix(
              case: tuple[str, SecurityClass, str, bool, str, str],
          ) -> None:
              """Verify profile security, optional fields, and active-state parsing."""
              key_mgmt, security, device, expected_active, ssid, interface_name = case

              async def scenario() -> None:
                  runner = FakeProcessRunner()
                  runner.queue(
                      NMCLI_PATH,
                      profile_summary_command(),
                      process_result(stdout=f"Profile:{DEFAULT_UUID}:wifi:{device}:yes\\n"),
                  )
                  runner.queue(
                      NMCLI_PATH,
                      profile_detail_command(DEFAULT_UUID),
                      process_result(stdout=f"{ssid}\\n{key_mgmt}\\n{interface_name}\\nyes\\n"),
                  )
                  backend = NmcliWifiBackend(runner, NMCLI_PATH)

                  profile = (await backend.list_saved_wifi_profiles())[0]

                  verify(profile.security == security)
                  verify(profile.active is expected_active)
                  verify(profile.ssid == (ssid or None))
                  verify(profile.interface_name == (interface_name or None))
                  runner.assert_finished()

              asyncio.run(scenario())'''
          replacement_lines = [
              line[10:] if line.startswith("          ") else line
              for line in replacement.splitlines()
          ]
          lines[matrix_start:matrix_end] = replacement_lines

          partial_start = find_start("def test_partial_profile_detail_fallbacks(")
          for index in range(partial_start, partial_start + 10):
              if lines[index] == "    expected_autoconnect: bool,":
                  if lines[index - 1] != "    *,":
                      lines.insert(index, "    *,")
                  break

          third_uuid = 'THIRD_UUID = "00000000-0000-0000-0000-000000000003"'
          third_index = lines.index(third_uuid)
          if "EXPECTED_ACTIVE_QUERY_COUNT = 2" not in lines:
              lines.insert(third_index + 1, "EXPECTED_ACTIVE_QUERY_COUNT = 2")
          lines = [
              line.replace(
                  "verify(len(runner.requests) == 2)",
                  "verify(len(runner.requests) == EXPECTED_ACTIVE_QUERY_COUNT)",
              )
              for line in lines
          ]
          path.write_text("\n".join(lines) + "\n", encoding="utf-8")
          PY
      - name: Validate profile module
        run: |
          black tests/unit/test_nmcli_profiles.py
          ruff check tests/unit/test_nmcli_profiles.py
          pytest -q tests/unit/test_nmcli_profiles.py
      - name: Remove workflow
        run: rm .github/workflows/profile-test-fix.yml
      - name: Commit directly to master
        shell: bash
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m "Fix remaining profile test lint issues"
          git push origin HEAD:master
