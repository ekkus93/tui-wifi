name: One-shot CI autofix

on:
  push:
    branches:
      - master

permissions:
  contents: write

env:
  PIP_DISABLE_PIP_VERSION_CHECK: "1"

jobs:
  autofix:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Check out master
        uses: actions/checkout@v6
        with:
          ref: master
          show-progress: false

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: pip

      - name: Install development dependencies
        run: python -m pip install --quiet -e '.[dev]'

      - name: Apply deterministic formatting and safe lint fixes
        run: |
          ruff check --fix . || true
          black .

      - name: Remove temporary diagnostic machinery
        run: |
          rm .github/workflows/ci-autofix.yml
          rm -f CI_DIAGNOSTICS.txt

      - name: Commit fixes directly to master
        shell: bash
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m "Apply CI formatting and safe lint fixes"
          git push origin HEAD:master
