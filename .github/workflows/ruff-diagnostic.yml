name: One-shot Ruff diagnostic

on:
  push:
    branches:
      - master

permissions:
  contents: write

env:
  PIP_DISABLE_PIP_VERSION_CHECK: "1"

jobs:
  diagnose:
    if: github.event.head_commit.message == 'Run Ruff diagnostic'
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          show-progress: false

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: pip

      - name: Install development dependencies
        run: python -m pip install --quiet -e '.[dev]'

      - name: Capture Ruff diagnostics
        shell: bash
        run: |
          set +e
          ruff check . --output-format=concise > docs/RUFF_DIAGNOSTIC.txt 2>&1
          status=$?
          printf '\nruff_exit_status=%s\n' "$status" >> docs/RUFF_DIAGNOSTIC.txt
          exit 0

      - name: Remove one-shot files
        run: |
          rm .github/workflows/ruff-diagnostic.yml
          rm .ruff-diagnostic-trigger

      - name: Commit diagnostic report
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m 'Capture Ruff diagnostic'
          git push origin HEAD:master
