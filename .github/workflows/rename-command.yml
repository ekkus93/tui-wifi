name: One-shot tui-wifi command rename

on:
  push:
    branches:
      - master

permissions:
  contents: write

jobs:
  rename:
    if: github.event.head_commit.message == 'Run direct tui-wifi command rename'
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          show-progress: false

      - name: Rename executable everywhere
        run: |
          python - <<'PY'
          from pathlib import Path
          import subprocess

          old = "wifi-tui"
          new = "tui-wifi"
          result = subprocess.run(
              ["git", "grep", "-Il", old],
              check=False,
              capture_output=True,
              text=True,
          )
          if result.returncode not in {0, 1}:
              raise SystemExit(result.stderr)
          paths = [Path(line) for line in result.stdout.splitlines()]
          if not paths:
              raise SystemExit(f"no tracked files contained {old!r}")
          for path in paths:
              content = path.read_text(encoding="utf-8")
              path.write_text(content.replace(old, new), encoding="utf-8")
          PY

      - name: Remove one-shot files
        run: |
          rm .github/workflows/rename-command.yml
          rm .rename-command-trigger

      - name: Commit rename
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m 'Rename command to tui-wifi'
          git push origin HEAD:master
